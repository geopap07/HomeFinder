{% extends "base.html" %}
{% block title %}Notifications – HomeFinder{% endblock %}
{% block content %}
<div class="container py-5">
  <h2 class="fw-bold mb-4"><i class="fas fa-bell me-2 text-warning"></i>Notifications</h2>
  {% if notifications %}
  <div class="list-group">
    {% for n in notifications %}
    <div class="list-group-item list-group-item-action notif-item {{ 'unread' if not n.is_read else '' }}">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <i class="fas fa-info-circle me-2 text-primary"></i>{{ n.message }}
        </div>
        <small class="text-muted ms-3 text-nowrap">{{ n.sent_at.strftime('%d %b %Y, %H:%M') }}</small>
      </div>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <div class="text-center py-5">
    <i class="fas fa-bell-slash fa-3x text-muted mb-3"></i>
    <h5 class="text-muted">No notifications</h5>
  </div>
  {% endif %}
</div>
{% endblock %}
