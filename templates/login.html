{% extends "base.html" %}
{% block title %}Login – HomeFinder{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="auth-card">
        <div class="auth-header text-center mb-4">
          <i class="fas fa-home fa-2x text-primary mb-2"></i>
          <h3 class="fw-bold">Welcome Back</h3>
          <p class="text-muted">Sign in to your HomeFinder account</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required/>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>
        </form>
        <p class="text-center mt-3 text-muted small">
          Don't have an account? <a href="{{ url_for('register') }}" class="text-primary">Register here</a>
        </p>
        <hr/>
        <div class="demo-accounts">
          <p class="text-muted small fw-bold mb-2"><i class="fas fa-info-circle me-1"></i>Demo Accounts:</p>
          <div class="row g-2">
            <div class="col-6">
              <div class="demo-box">
                <small class="fw-bold text-primary">Regular User</small><br/>
                <small>user@homefinder.com</small><br/>
                <small>User123!</small>
              </div>
            </div>
            <div class="col-6">
              <div class="demo-box">
                <small class="fw-bold text-danger">Admin</small><br/>
                <small>admin@homefinder.com</small><br/>
                <small>Admin123!</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
