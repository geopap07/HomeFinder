{% extends "base.html" %}
{% block title %}Register – HomeFinder{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="auth-card">
        <div class="auth-header text-center mb-4">
          <i class="fas fa-user-plus fa-2x text-primary mb-2"></i>
          <h3 class="fw-bold">Create Account</h3>
          <p class="text-muted">Join HomeFinder to save and inquire about properties</p>
        </div>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Full Name</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" name="name" class="form-control" placeholder="Your full name" required/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required/>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Min 8 characters" required/>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password2" class="form-control" placeholder="Repeat password" required/>
            </div>
          </div>
          <p class="text-muted small mb-3">
            <i class="fas fa-shield-alt me-1 text-success"></i>
            GDPR compliant – only essential data collected
          </p>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </button>
        </form>
        <p class="text-center mt-3 text-muted small">
          Already have an account? <a href="{{ url_for('login') }}" class="text-primary">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
